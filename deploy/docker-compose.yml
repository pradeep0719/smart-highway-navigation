# Smart Highway Navigation — production Docker Compose stack
# Usage: cp .env.example .env && docker compose up -d --build

services:
  mongo:
    image: mongo:7
    container_name: shn-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-highway-nav
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shn-network

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: shn-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-highway-nav
      # Public URL users access (nginx on port 80)
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - shn-network

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Smart Highway Navigation}
    container_name: shn-web
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - shn-network

volumes:
  mongo_data:

networks:
  shn-network:
    driver: bridge
